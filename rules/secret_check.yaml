version: v1
type: rule-type
name: secret_check

def:
  in_entity: pull_request

  ingest:
    type: diff

  eval:
    type: rego
    rego:
      type: deny-by-default
      def: |
        package minder
  
        default allow := false
  
        allow {
          not has_secret
        }
  
        has_secret {
          some i
          file := input.pull_request.diff.files[i]
          contains(file.content, "SECRET")
        }

