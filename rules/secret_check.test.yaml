version: v1

tests:
  - name: should fail when secret is present

    input:
      pull_request:
        diff:
          files:
            - path: config.js
              content: |
                const API_KEY = "SECRET_12345";

    expect: fail

  - name: should pass when no secret

    input:
      pull_request:
        diff:
          files:
            - path: app.js
              content: |
                console.log("hello world");

    expect: pass
