version: v1

tests:
  - name: should fail when vulnerable dependency added

    input:
      pull_request:
        diff:
          files:
            - path: package-lock.json
              added_dependencies:
                - name: lodash
                  version: '4.17.19'

    mock:
      vulnerability_db:
        lodash@4.17.19:
          vulnerable: true

    expect: fail

  - name: should pass when dependency is safe

    input:
      pull_request:
        diff:
          files:
            - path: package-lock.json
              added_dependencies:
                - name: lodash
                  version: '4.17.21'

    mock:
      vulnerability_db:
        lodash@4.17.21:
          vulnerable: false

    expect: pass
